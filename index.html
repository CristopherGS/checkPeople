<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckPeople – Busca personas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #2b6cb0;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }

    /* ── Main ── */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 2.5rem auto;
      padding: 0 1rem;
    }

    /* ── Search card ── */
    .search-card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }
    .search-card h2 {
      font-size: 1.15rem;
      margin-bottom: 1.25rem;
      color: #2b6cb0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; color: #4a5568; }
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color .2s;
      outline: none;
    }
    input[type="text"]:focus { border-color: #2b6cb0; }

    .btn-search {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.75rem;
      background: #2b6cb0;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-search:hover  { background: #2c5282; }
    .btn-search:active { transform: scale(0.98); }

    /* ── Results ── */
    #results { margin-top: 2rem; }
    .result-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 1.25rem;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #bee3f8;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700; color: #2b6cb0;
      flex-shrink: 0;
    }
    .result-info h3 { font-size: 1rem; font-weight: 700; }
    .result-info p  { font-size: 0.82rem; color: #718096; margin-top: 3px; }

    .badge {
      margin-left: auto;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-found    { background: #c6f6d5; color: #276749; }
    .badge-notfound { background: #fed7d7; color: #9b2c2c; }

    .empty-state {
      text-align: center;
      color: #a0aec0;
      padding: 2.5rem 0;
      font-size: 0.95rem;
    }
    .empty-state svg { display: block; margin: 0 auto 0.75rem; opacity: .5; }

    .error-msg { color: #c53030; font-size: 0.9rem; margin-top: 0.5rem; display: none; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.78rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>

<header>
  <!-- person-search icon -->
  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
       fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <div>
    <h1>CheckPeople</h1>
    <p>Busca y verifica información de personas</p>
  </div>
</header>

<main>
  <div class="search-card">
    <h2>🔍 Nueva búsqueda</h2>
    <form id="searchForm" novalidate>
      <div class="form-grid">
        <div>
          <label for="firstName">Nombre</label>
          <input type="text" id="firstName" placeholder="Ej. Juan" autocomplete="given-name" />
        </div>
        <div>
          <label for="lastName">Apellido</label>
          <input type="text" id="lastName" placeholder="Ej. Pérez" autocomplete="family-name" />
        </div>
        <div>
          <label for="city">Ciudad</label>
          <input type="text" id="city" placeholder="Ej. Santiago" autocomplete="address-level2" />
        </div>
        <div>
          <label for="country">País</label>
          <input type="text" id="country" placeholder="Ej. Chile" autocomplete="country-name" />
        </div>
      </div>
      <p class="error-msg" id="errorMsg">Por favor ingresa al menos el nombre o apellido.</p>
      <button type="submit" class="btn-search">Buscar persona</button>
    </form>
  </div>

  <section id="results" aria-live="polite"></section>
</main>

<footer>
  &copy; <span id="year"></span> CheckPeople &mdash; Todos los derechos reservados
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  /* ── Demo data (replace with a real API call) ── */
  const DEMO_PEOPLE = [
    { id: 1, firstName: 'Juan',    lastName: 'Pérez',    city: 'Santiago',     country: 'Chile',     email: 'juan.perez@example.com' },
    { id: 2, firstName: 'María',   lastName: 'González', city: 'Buenos Aires', country: 'Argentina', email: 'maria.g@example.com'    },
    { id: 3, firstName: 'Carlos',  lastName: 'López',    city: 'Lima',         country: 'Perú',      email: 'c.lopez@example.com'    },
    { id: 4, firstName: 'Ana',     lastName: 'Martínez', city: 'Bogotá',       country: 'Colombia',  email: 'ana.m@example.com'      },
    { id: 5, firstName: 'Luis',    lastName: 'Rodríguez',city: 'México DF',    country: 'México',    email: 'luis.r@example.com'     },
    { id: 6, firstName: 'Sofía',   lastName: 'Torres',   city: 'Santiago',     country: 'Chile',     email: 'sofia.t@example.com'    },
  ];

  function normalize(str) {
    return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function search(query) {
    const { firstName, lastName, city, country } = query;
    return DEMO_PEOPLE.filter(p => {
      if (firstName && !normalize(p.firstName).includes(normalize(firstName))) return false;
      if (lastName  && !normalize(p.lastName ).includes(normalize(lastName ))) return false;
      if (city      && !normalize(p.city     ).includes(normalize(city     ))) return false;
      if (country   && !normalize(p.country  ).includes(normalize(country  ))) return false;
      return true;
    });
  }

  function initials(p) {
    return ((p.firstName[0] || '') + (p.lastName[0] || '')).toUpperCase();
  }

  function renderResults(people, query) {
    const section = document.getElementById('results');
    if (people.length === 0) {
      section.innerHTML = `
        <div class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>No se encontraron resultados para tu búsqueda.</p>
        </div>`;
      return;
    }

    const cards = people.map(p => `
      <div class="result-card">
        <div class="avatar">${initials(p)}</div>
        <div class="result-info">
          <h3>${escHtml(p.firstName)} ${escHtml(p.lastName)}</h3>
          <p>📍 ${escHtml(p.city)}, ${escHtml(p.country)}</p>
          <p>✉️ ${escHtml(p.email)}</p>
        </div>
        <span class="badge badge-found">Encontrado</span>
      </div>`).join('');

    section.innerHTML = `
      <p style="font-size:.85rem;color:#718096;margin-bottom:.75rem">
        ${people.length} resultado${people.length !== 1 ? 's' : ''} encontrado${people.length !== 1 ? 's' : ''}
      </p>
      ${cards}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('searchForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const errorMsg = document.getElementById('errorMsg');
    const query = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName:  document.getElementById('lastName' ).value.trim(),
      city:      document.getElementById('city'     ).value.trim(),
      country:   document.getElementById('country'  ).value.trim(),
    };

    if (!query.firstName && !query.lastName) {
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';

    const results = search(query);
    renderResults(results, query);
  });
</script>
</body>
</html>
